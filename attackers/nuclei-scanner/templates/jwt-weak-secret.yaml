id: jwt-weak-secret

info:
  name: JWT Signed With Weak/Default Secret
  author: deploysapp-sectest
  severity: high
  description: |
    Attempts to obtain a JWT using default credentials, then verifies the token
    was signed with a known weak secret (secret123). If the token can be decoded
    and re-signed, it indicates the platform's auth service is using a weak secret.
  tags: jwt,auth,paas,weak-crypto

requests:
  - method: POST
    path:
      - "{{BaseURL}}/auth/login"
    headers:
      Content-Type: application/json
      Host: "{{Hostname}}"
    body: '{"user":"admin","password":"admin123"}'
    matchers:
      - type: word
        words:
          - "token"
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        name: jwt_token
        regex:
          - '"token":"([^"]+)"'
